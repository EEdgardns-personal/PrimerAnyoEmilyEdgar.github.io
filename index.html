<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Primer Año</title>
    <style>
        /* ============================
           ESTILOS GENERALES Y FONDO ULTRA SUAVIZADO (INTACTO)
           ============================ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { overflow: hidden; background-color: #000000; color: white; }
        
        body::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,20,147,0.008), transparent 60%), radial-gradient(circle at 30% 70%, rgba(0,206,209,0.008), transparent 50%);
            filter: blur(100px); z-index: -3; animation: nebula-drift 40s infinite alternate linear;
        }
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px), radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px), radial-gradient(gold, rgba(255,215,0,.15) 1.5px, transparent 2.5px), radial-gradient(cyan, rgba(0,255,255,.1) 1px, transparent 2px);
            background-size: 450px 450px, 250px 250px, 350px 350px, 500px 500px;
            background-position: 0 0, 40px 60px, 130px 270px, 200px 100px;
            z-index: -2; animation: stars 15s linear infinite;
        }

        .screen {
            position: absolute; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out; padding: 20px; z-index: 10;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.05); z-index: -1; }

        /* Estrellas fugaces */
        .shooting-star {
            position: absolute; width: 300px; height: 2px; background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.9));
            animation: shooting 1.8s linear forwards; z-index: 5; pointer-events: none; box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
        }
        .shooting-star::after {
            content: ''; position: absolute; right: 0; top: -3px; width: 8px; height: 8px; background: #fff; border-radius: 50%; box-shadow: 0 0 15px 5px rgba(255,255,255,0.8);
        }
        .te-amo-bg {
            position: absolute; color: rgba(255, 105, 180, 0.3); font-size: 3.5rem; font-weight: 200; font-style: italic; text-shadow: 0 0 15px rgba(255, 20, 147, 0.5); pointer-events: none; z-index: 4; animation: fadeTeAmo 2.8s ease-in-out forwards;
        }

        /* FUEGOS ARTIFICIALES "TE AMO" (FASE 2) */
        .firework-te-amo {
            position: absolute; color: rgba(255, 105, 180, 0.9); font-weight: 800; font-style: italic;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.9), 0 0 10px rgba(255, 255, 255, 0.6);
            pointer-events: none; z-index: 55; /* Por encima de la foto agrandada, debajo de la letra */
            animation: fireworkFloat 2s ease-out forwards;
        }
        @keyframes fireworkFloat {
            0% { opacity: 0; transform: scale(0.5) translate(0, 0); }
            20% { opacity: 1; transform: scale(1.2) translate(var(--tx), var(--ty)); }
            100% { opacity: 0; transform: scale(1) translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5 - 50px)); }
        }

        /* PLANETAS FASE 1 */
        .planet { position: absolute; border-radius: 50%; z-index: 1; opacity: 0.35; }
        .planet1 { width: 110px; height: 110px; top: 15%; left: 12%; background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe, #000033); box-shadow: inset -15px -15px 25px rgba(0,0,0,0.9), 0 0 15px rgba(79, 172, 254, 0.2); animation: float-planet 10s ease-in-out infinite; }
        .planet2 { width: 140px; height: 140px; bottom: 5%; right: 8%; background: radial-gradient(circle at 30% 30%, #ff9a9e, #fecfef, #33001b); box-shadow: inset -20px -20px 40px rgba(0,0,0,0.9), 0 0 15px rgba(255, 154, 158, 0.2); animation: float-planet 14s ease-in-out infinite reverse; }
        .planet3 { width: 70px; height: 70px; top: 18%; right: 20%; background: radial-gradient(circle at 30% 30%, #e8c39e, #c59b6d, #6b4d31); box-shadow: inset -15px -15px 25px rgba(0,0,0,0.9), 0 0 10px rgba(197, 155, 109, 0.2); animation: float-planet 12s ease-in-out infinite; transform-style: preserve-3d; }
        .planet3::after { content: ""; position: absolute; top: 50%; left: 50%; width: 140px; height: 30px; border: 8px solid rgba(232, 195, 158, 0.4); border-radius: 50%; transform: translate(-50%, -50%) rotateX(75deg) rotateY(15deg); box-shadow: 0 0 10px rgba(232, 195, 158, 0.2), inset 0 0 10px rgba(232, 195, 158, 0.2); }
        .planet-earth { width: 110px; height: 110px; bottom: 8%; left: 6%; background: radial-gradient(circle at 40% 40%, #0077be 0%, #001e36 90%); box-shadow: inset -20px -20px 30px rgba(0,0,0,0.9), 0 0 15px rgba(0, 119, 190, 0.3); overflow: hidden; animation: float-planet 16s ease-in-out infinite alternate; }
        .planet-earth::before { content: ""; position: absolute; width: 40px; height: 70px; background: #2e8b57; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; top: 45%; left: 40%; transform: rotate(15deg); filter: blur(3px); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.5); opacity: 0.7; }
        .planet-earth::after { content: ""; position: absolute; width: 60px; height: 40px; background: #2e8b57; border-radius: 50% 40% 60% 40% / 60% 50% 40% 50%; top: 5%; left: 15%; transform: rotate(-15deg); filter: blur(3px); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.5); opacity: 0.7; }

        /* FASE 1 PANTALLA */
        .header-text { position: absolute; top: 30px; right: 30px; text-align: right; z-index: 20; }
        .header-text h1 { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 5px; font-weight: 800; color: #ffffff; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9), 0 0 10px rgba(255, 255, 255, 0.4); }
        .header-text h2 { font-size: 1.2rem; font-weight: 600; color: #e0e0e0; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9); }
        .fase1-center { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 80px; z-index: 10; }
        .lock-image { max-width: 170px; margin-bottom: 15px; filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.5)); animation: lock-float 6s ease-in-out infinite; }
        .instruction { font-size: 1.2rem; color: #cccccc; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .password-display { font-size: 2.5rem; letter-spacing: 15px; height: 50px; margin-bottom: 25px; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); font-weight: bold; }
        .shake { animation: shake 0.4s ease-in-out; color: #ff6666 !important; text-shadow: 0 0 15px rgba(255, 102, 102, 0.7) !important; }

        /* TECLADO */
        .keypad { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; justify-content: center; background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 20px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 25px rgba(0,0,0,0.9); }
        .keypad button { width: 70px; height: 70px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.15); background: linear-gradient(145deg, #16162a, #0d0d1c); color: #e0e0e0; font-size: 24px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: transform 0.1s, border-color 0.2s, background-color 0.2s, color 0.2s; }
        .keypad button:hover { border-color: rgba(255, 255, 255, 0.5); background: linear-gradient(145deg, #1d1d36, #16162a); color: #ffffff; }
        .keypad button:active { transform: scale(0.92); }

        /* FOTOS FASE 1 */
        .corner-photo { position: absolute; max-width: 150px; border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.9); transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), z-index 0s, filter 0.3s; z-index: 20; cursor: pointer; }
        .corner-photo:hover { filter: brightness(1.1) drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        .couple-left { bottom: 35vh; left: 30px; transform: rotate(-8deg); } 
        .couple-right { bottom: 30vh; right: 30px; transform: rotate(8deg); }
        .enlarged-left { transform: translate(12vw, -10vh) scale(3) rotate(0deg) !important; z-index: 100 !important; box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 255, 255, 0.2); }
        .enlarged-right { transform: translate(-12vw, -10vh) scale(3) rotate(0deg) !important; z-index: 100 !important; box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 255, 255, 0.2); }

        /* ============================
           FASE 2: DEEP SPACE EXTREMO Y CARRUSEL
           ============================ */
        #fase2 { position: relative; }

        .spiral-galaxy { position: absolute; top: 50%; left: 50%; width: 80vw; height: 80vw; transform: translate(-50%, -50%); background: conic-gradient(from 0deg, transparent 0%, rgba(255, 20, 147, 0.15) 15%, transparent 30%, rgba(0, 255, 255, 0.15) 45%, transparent 60%, rgba(255, 20, 147, 0.15) 75%, transparent 90%); border-radius: 50%; filter: blur(20px); z-index: -2; animation: spin-galaxy 50s linear infinite; pointer-events: none; }
        .pulsar { position: absolute; top: 20%; right: 35%; width: 8px; height: 8px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px 10px rgba(0, 255, 255, 0.8); z-index: -1; animation: pulse-sun 1s alternate infinite; }
        .pulsar::before { content: ""; position: absolute; width: 300px; height: 2px; background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.7), transparent); top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg); }
        .black-hole { position: absolute; bottom: 20%; left: 10%; width: 90px; height: 90px; background: #000; border-radius: 50%; box-shadow: 0 0 40px 15px rgba(255, 50, 50, 0.6), 0 0 80px 25px rgba(100, 50, 255, 0.4); z-index: -1; animation: float-planet 20s ease-in-out infinite; }
        .black-hole::before { content: ""; position: absolute; top: -25px; left: -25px; right: -25px; bottom: -25px; border-radius: 50%; border: 4px solid rgba(255, 100, 50, 0.5); transform: rotateX(75deg) rotateY(-10deg); box-shadow: 0 0 30px rgba(255, 100, 50, 0.7), inset 0 0 20px rgba(255, 100, 50, 0.7); animation: spin-rays 4s linear infinite; }
        .constellation { position: absolute; z-index: -1; opacity: 0.6; pointer-events: none; }

        .sun-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; }
        .realistic-sun { width: 200px; height: 200px; background: radial-gradient(circle at 50% 50%, #ffffff 0%, #fff7a1 15%, #ffdf00 40%, #ff8c00 80%, #ff4500 100%); border-radius: 50%; position: relative; box-shadow: 0 0 60px #ffdf00, 0 0 120px #ff8c00, 0 0 180px #ff4500, inset 0 0 30px rgba(255, 255, 255, 0.9); animation: pulse-sun-core 4s infinite alternate; z-index: 2; }
        .realistic-sun::before { content: ""; position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px; border-radius: 50%; background: conic-gradient(from 0deg, transparent 0deg, rgba(255, 215, 0, 0.6) 30deg, transparent 60deg, rgba(255, 140, 0, 0.6) 90deg, transparent 120deg, rgba(255, 215, 0, 0.6) 150deg, transparent 180deg, rgba(255, 140, 0, 0.6) 210deg, transparent 240deg, rgba(255, 215, 0, 0.6) 270deg, transparent 300deg, rgba(255, 140, 0, 0.6) 330deg, transparent 360deg); filter: blur(10px); z-index: -1; animation: spin-rays 20s linear infinite; }

        /* ANIMACIONES CLAVE */
        @keyframes nebula-drift { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(3deg) scale(1.05); } }
        @keyframes stars { 0% { transform: scale(1) rotate(0deg) translateY(0); } 50% { transform: scale(1.01) rotate(0.1deg) translateY(-1px); } 100% { transform: scale(1) rotate(0deg) translateY(0); } }
        @keyframes shooting { 0% { transform: translate(0, 0) rotate(35deg); opacity: 1; } 100% { transform: translate(120vw, 100vh) rotate(35deg); opacity: 0; } }
        @keyframes fadeTeAmo { 0% { opacity: 0; transform: scale(0.8) translateY(15px); } 40% { opacity: 1; transform: scale(1.05) translateY(0); } 100% { opacity: 0; transform: scale(1.1) translateY(-15px); } }
        @keyframes float-planet { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
        @keyframes lock-float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.02); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        @keyframes spin-galaxy { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse-sun-core { 0% { transform: scale(1); box-shadow: 0 0 60px #ffdf00, 0 0 120px #ff8c00, 0 0 180px #ff4500, inset 0 0 30px rgba(255, 255, 255, 0.9); } 100% { transform: scale(1.05); box-shadow: 0 0 80px #ffdf00, 0 0 140px #ff8c00, 0 0 220px #ff4500, inset 0 0 40px rgba(255, 255, 255, 1); } }
        @keyframes spin-rays { 100% { transform: rotate(360deg); } }

        /* CARRUSEL DE 13 FOTOS */
        .orbit-center { position: absolute; z-index: 5; animation: orbit-spin 55s linear infinite; }
        @keyframes orbit-spin { 100% { transform: rotate(360deg); } }
        
        .orbit-arm { position: absolute; transform: rotate(var(--angle)); }
        
        .orbit-distance {
            position: absolute; top: -34vh; left: -45px; width: 90px; height: 90px;
            transform: rotate(calc(-1 * var(--angle))); 
        }
        
        .orbit-counter-spin { width: 100%; height: 100%; animation: orbit-reverse 55s linear infinite; }
        @keyframes orbit-reverse { 100% { transform: rotate(-360deg); } }

        .orbit-counter-spin img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 12px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); transition: transform 0.3s, filter 0.3s; pointer-events: auto;
        }
        .orbit-counter-spin img:hover { transform: scale(1.3); filter: brightness(1.2); box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3); }

        /* OVERLAY PARA FOTO GRANDE CON TEXTO */
        .enlarged-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .enlarged-overlay.active { opacity: 1; pointer-events: auto; }
        
        .enlarged-caption {
            color: #ffffff; font-size: 2.2rem; font-weight: 600; font-style: italic; margin-bottom: 25px; text-align: center;
            text-shadow: 0 5px 15px rgba(255, 105, 180, 0.9), 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease, transform 0.5s ease; letter-spacing: 1px; max-width: 90%;
        }
        .enlarged-overlay.active .enlarged-caption { opacity: 1; transform: translateY(0); transition-delay: 0.2s; }

        .enlarged-overlay img {
            max-width: 85vw; max-height: 55vh; border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 35px rgba(255,255,255,0.2);
            transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer;
        }
        .enlarged-overlay.active img { transform: scale(1); }

        /* LETRAS DE LA CANCIÓN - ABAJO */
        .lyrics {
            position: absolute; bottom: 12vh; left: 50%; width: 90%;
            font-size: 2.5rem; text-align: center; font-style: italic; color: #ffffff; font-weight: 700;
            letter-spacing: 2px; opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease;
            text-shadow: 0 5px 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 215, 0, 0.6);
            z-index: 60; pointer-events: none; transform: translate(-50%, 0) scale(1);
        }
        .lyrics.show { opacity: 1; transform: translate(-50%, 0) scale(1); }
        .lyrics.hide { opacity: 0; transform: translate(-50%, -15px) scale(0.95); }

        /* BOTÓN DE SALIR */
        .exit-btn {
            position: absolute; bottom: 30px; right: 30px; color: #ffffff; opacity: 0.2; font-size: 1rem;
            cursor: pointer; z-index: 100; transition: opacity 0.3s, text-shadow 0.3s;
            letter-spacing: 3px; text-transform: uppercase; font-weight: 300;
        }
        .exit-btn:hover { opacity: 0.8; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

    </style>
</head>
<body>

    <!-- FASE 1: Pantalla de Contraseña -->
    <div id="fase1" class="screen">
        <div class="planet planet1"></div>
        <div class="planet planet2"></div>
        <div class="planet planet3"></div> 
        <div class="planet planet-earth"></div> 

        <div class="header-text">
            <h1>FELIZ PRIMER AÑO JUNTOS AMOR</h1>
            <h2>EMILY Y EDGAR</h2>
        </div>
        
        <div class="fase1-center">
            <img src="imagenes/candado.png" alt="Candado" class="lock-image">
            <div class="instruction">Enter password</div>
            <div class="password-display" id="display"></div>
            
            <div class="keypad">
                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>
                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>
                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>
                <button onclick="deleteChar()" style="color: #ff6666; font-size: 1.8rem; text-shadow: 0 0 10px rgba(255,102,102,0.3);">⌫</button>
                <button onclick="press('0')">0</button>
                <button onclick="submitPassword()" style="color: #66ff66; font-size: 1.8rem; text-shadow: 0 0 10px rgba(102,255,102,0.3);">✓</button>
            </div>
        </div>

        <img src="imagenes/foto_cine.png" alt="Foto de ustedes" class="corner-photo couple-left" onclick="toggleSize(this, 'left')">
        <img src="imagenes/foto_primera.png" alt="Otra foto de ustedes" class="corner-photo couple-right" onclick="toggleSize(this, 'right')">
    </div>

    <!-- FASE 2: Experiencia Musical -->
    <div id="fase2" class="screen hidden">
        
        <div class="spiral-galaxy"></div>
        <div class="black-hole"></div>
        <div class="pulsar"></div>
        
        <svg class="constellation" style="position: absolute; top: 15%; right: 15%; width: 250px; height: 250px;" viewBox="0 0 100 100">
            <line x1="10" y1="80" x2="40" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <line x1="40" y1="40" x2="80" y2="30" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <line x1="80" y1="30" x2="90" y2="10" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <circle cx="10" cy="80" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
            <circle cx="40" cy="40" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
            <circle cx="80" cy="30" r="2.5" fill="cyan" filter="drop-shadow(0 0 5px cyan)" />
            <circle cx="90" cy="10" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
        </svg>

        <svg class="constellation" style="position: absolute; bottom: 25%; left: 8%; width: 200px; height: 200px;" viewBox="0 0 100 100">
            <line x1="20" y1="20" x2="50" y2="50" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <line x1="50" y1="50" x2="40" y2="80" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <line x1="50" y1="50" x2="90" y2="60" stroke="rgba(255,255,255,0.7)" stroke-width="0.8"/>
            <circle cx="20" cy="20" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
            <circle cx="50" cy="50" r="2.5" fill="magenta" filter="drop-shadow(0 0 5px magenta)" />
            <circle cx="40" cy="80" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
            <circle cx="90" cy="60" r="2" fill="white" filter="drop-shadow(0 0 3px white)" />
        </svg>

        <div class="sun-container">
            <div class="realistic-sun"></div>
            
            <!-- Carrusel Orbital de 13 Fotos -->
            <div class="orbit-center">
                <!-- Foto 1 -->
                <div class="orbit-arm" style="--angle: 0deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_beso_sala.jpeg" onclick="openEnlargedPhoto(this.src, 'Besos que enamoran.')">
                </div></div></div>
                <!-- Foto 2 -->
                <div class="orbit-arm" style="--angle: 27.7deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_bus_U.jpg" onclick="openEnlargedPhoto(this.src, 'Viajando juntos en la U.')">
                </div></div></div>
                <!-- Foto 3 -->
                <div class="orbit-arm" style="--angle: 55.4deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_cine_sonriendo.jpeg" onclick="openEnlargedPhoto(this.src, 'Noches de cine y sonrisas.')">
                </div></div></div>
                <!-- Foto 4 -->
                <div class="orbit-arm" style="--angle: 83.1deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_comida_graduacion.jpeg" onclick="openEnlargedPhoto(this.src, 'Celebrando logros juntos.')">
                </div></div></div>
                <!-- Foto 5 -->
                <div class="orbit-arm" style="--angle: 110.8deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_comida_museo.jpeg" onclick="openEnlargedPhoto(this.src, 'Almuerzo con arte y amor.')">
                </div></div></div>
                <!-- Foto 6 -->
                <div class="orbit-arm" style="--angle: 138.5deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_comida_pinche.jpeg" onclick="openEnlargedPhoto(this.src, 'Antojos compartidos.')">
                </div></div></div>
                <!-- Foto 7 -->
                <div class="orbit-arm" style="--angle: 166.2deg;"><div class="orbit-distance"><div class="orbit-counter-spin">
                    <img src="imagenes/segunda_pantalla/foto_cuarto_Emi.jpeg" onclick="openEnlargedPhoto(this.src, 'Nuestra paz en tu cuarto.')">
                </div></div></div>

    <script>
        // Funciones Fase 1
        function toggleSize(imgElement, side) {
            if (side === 'left') { imgElement.classList.toggle('enlarged-left'); } 
            else if (side === 'right') { imgElement.classList.toggle('enlarged-right'); }
        }

        const passTarget = "290625";
        let currentPass = "";
        const display = document.getElementById("display");
        const fase1 = document.getElementById("fase1");
        const fase2 = document.getElementById("fase2");
        const music = document.getElementById("music");

        function press(num) {
            if (currentPass.length < 6) { currentPass += num; updateDisplay(); }
        }

        function deleteChar() {
            if (currentPass.length > 0) { currentPass = currentPass.slice(0, -1); updateDisplay(); }
        }

        function updateDisplay() { display.innerText = "•".repeat(currentPass.length); }

        function submitPassword() {
            if (currentPass === passTarget) {
                fase1.classList.add("hidden");
                fase2.classList.remove("hidden");
                setTimeout(() => { music.play().catch(e => console.log("Clickea la pantalla para permitir el audio.")); }, 1000);
            } else {
                display.classList.add("shake");
                setTimeout(() => { currentPass = ""; updateDisplay(); display.classList.remove("shake"); }, 400);
            }
        }

        // --- SISTEMA DE ESTRELLAS FUGACES (AMBAS FASES) ---
        function createShootingStar(container) {
            const star = document.createElement("div");
            star.classList.add("shooting-star");
            
            const startX = Math.random() * (window.innerWidth / 2) - 400;
            const startY = Math.random() * (window.innerHeight / 2) - 200;
            
            star.style.left = startX + "px";
            star.style.top = startY + "px";
            container.appendChild(star);

            const text = document.createElement("div");
            text.classList.add("te-amo-bg");
            text.innerText = "Te amo";
            
            const textX = Math.random() * (window.innerWidth - 300) + 100;
            const textY = Math.random() * (window.innerHeight - 300) + 100;
            text.style.left = textX + "px";
            text.style.top = textY + "px";
            text.style.transform = `scale(${Math.random() * 0.5 + 0.8})`;
            container.appendChild(text);

            setTimeout(() => { star.remove(); text.remove(); }, 3000);
        }

        // Intervalo para Fase 1 (cada 3 segundos)
        setInterval(() => {
            if (!fase1.classList.contains("hidden")) {
                const cantidad = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < cantidad; i++) setTimeout(() => createShootingStar(fase1), i * 600); 
            }
        }, 3000);

        // Intervalo para Fase 2 (cada 5 segundos)
        setInterval(() => {
            if (!fase2.classList.contains("hidden")) {
                const cantidad = Math.floor(Math.random() * 3) + 1;
                for (let i = 0; i < cantidad; i++) setTimeout(() => createShootingStar(fase2), i * 600); 
            }
        }, 5000);


        // --- LÓGICA DE FOTOS, CARRUSEL Y FUEGOS ARTIFICIALES ---
        const overlay = document.getElementById('enlarged-overlay');
        const overlayImg = document.getElementById('enlarged-img');
        const overlayCaption = document.getElementById('enlarged-caption');

        function openEnlargedPhoto(src, captionText) {
            overlayImg.src = src;
            overlayCaption.innerText = captionText; 
            overlay.classList.add('active');
            createTeAmoFireworks(); // Llama a los fuegos artificiales
        }

        function closeEnlargedPhoto() {
            overlay.classList.remove('active');
        }

        function createTeAmoFireworks() {
            const numFireworks = 12; // Cantidad de "Te amos" que explotan
            for(let i=0; i<numFireworks; i++) {
                setTimeout(() => {
                    const fw = document.createElement("div");
                    fw.classList.add("firework-te-amo");
                    fw.innerText = "Te amo";
                    
                    // Repartir mitad a la izquierda y mitad a la derecha de la pantalla
                    const isLeft = i % 2 === 0;
                    const startX = isLeft ? (Math.random() * 20 + 5) : (Math.random() * 20 + 75); 
                    const startY = Math.random() * 50 + 25; 
                    
                    fw.style.left = startX + "vw";
                    fw.style.top = startY + "vh";
                    
                    // Direcciones aleatorias hacia afuera
                    const tx = (Math.random() - 0.5) * 150 + "px";
                    const ty = (Math.random() - 0.5) * 150 + "px";
                    fw.style.setProperty('--tx', tx);
                    fw.style.setProperty('--ty', ty);
                    
                    // Tamaños aleatorios
                    fw.style.fontSize = (Math.random() * 1.5 + 1.5) + "rem";
                    
                    fase2.appendChild(fw);
                    
                    // Limpiar el DOM después de la animación
                    setTimeout(() => fw.remove(), 2500);
                }, i * 150); // Aparecen en cascada rápida
            }
        }

        function exitFase2() {
            music.pause();
            music.currentTime = 0;
            closeEnlargedPhoto();
            fase2.classList.add("hidden");
            fase1.classList.remove("hidden");
            currentPass = "";
            updateDisplay();
        }

        // LETRA DE LA CANCIÓN
        const lyricsDisplay = document.getElementById("lyrics-display");
        const lyricsData = [
            { time: 0, text: "" },
            { time: 14.0, text: "We could leave the Christmas lights up 'til January" },
            { time: 20.5, text: "And this is our place, we make the rules" },
            { time: 27.5, text: "And there's a dazzling haze, a mysterious way about you, dear" },
            { time: 34.0, text: "Have I known you 20 seconds or 20 years?" },
            { time: 40.5, text: "Can I go where you go?" },
            { time: 47.0, text: "Can we always be this close forever and ever?" },
            { time: 54.0, text: "And ah, take me out, and take me home" },
            { time: 60.5, text: "You're my, my, my, my..." },
            { time: 65.5, text: "Lover" },
            { time: 74.5, text: "We could let our friends crash in the living room" },
            { time: 81.0, text: "This is our place, we make the call" },
            { time: 88.0, text: "And I'm highly suspicious that everyone who sees you wants you" },
            { time: 94.5, text: "I've loved you three summers now, honey, but I want 'em all" },
            { time: 101.0, text: "Can I go where you go?" },
            { time: 107.5, text: "Can we always be this close forever and ever?" },
            { time: 114.5, text: "And ah, take me out, and take me home" },
            { time: 121.0, text: "You're my, my, my, my..." },
            { time: 126.0, text: "Lover" },
            { time: 131.5, text: "Ladies and gentlemen, will you please stand?" },
            { time: 134.5, text: "With every guitar string scar on my hand" },
            { time: 138.0, text: "I take this magnetic force of a man to be my lover" },
            { time: 145.0, text: "My heart's been borrowed and yours has been blue" },
            { time: 148.0, text: "All's well that ends well to end up with you" },
            { time: 151.5, text: "Swear to be overdramatic and true to my lover" },
            { time: 158.0, text: "And you'll save all your dirtiest jokes for me" },
            { time: 161.5, text: "And at every table, I'll save you a seat, lover" },
            { time: 171.5, text: "Can I go where you go?" },
            { time: 178.5, text: "Can we always be this close forever and ever?" },
            { time: 185.0, text: "And ah, take me out, and take me home" },
            { time: 191.5, text: "You're my, my, my, my..." },
            { time: 196.5, text: "Oh, you're my, my, my, my..." },
            { time: 202.5, text: "Darling, you're my, my, my, my..." },
            { time: 209.5, text: "Lover" },
            { time: 220.0, text: "..." }
        ];

        music.addEventListener("timeupdate", () => {
            const currentTime = music.currentTime;
            let currentLine = "";

            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) { currentLine = lyricsData[i].text; }
            }

            if (lyricsDisplay.innerText !== currentLine) {
                lyricsDisplay.classList.remove("show");
                lyricsDisplay.classList.add("hide");
                
                setTimeout(() => {
                    lyricsDisplay.innerText = currentLine;
                    lyricsDisplay.classList.remove("hide");
                    lyricsDisplay.classList.add("show");
                }, 400); 
            }
        });
    </script>
